<h2>Login</h2>

<form (ngSubmit)="login()">
  <div>
    <label>Username</label>
    <input name="username" [(ngModel)]="username" />
  </div>

  <div>
    <label>Password</label>
    <input name="password" type="password" [(ngModel)]="password" />
  </div>

  <button type="submit">Login</button>
</form>

<p style="color: red;">{{ errorMessage }}</p>
