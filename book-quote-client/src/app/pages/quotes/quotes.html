<div class="quotes-page container py-4">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
    <div>
      <h1>My Quotes</h1>
      <p class="text-muted mb-0">Add, edit and delete quotes with a clean card layout.</p>
    </div>
    <button type="button" class="btn btn-primary btn-lg" (click)="onAddNew()" *ngIf="!isFormVisible">
      <i class="fas fa-plus me-2"></i> Add New Quote
    </button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div class="card mb-4" *ngIf="isFormVisible">
    <div class="card-body">
      <h5 class="card-title mb-3">{{ isEditing ? 'Edit Quote' : 'Add New Quote' }}</h5>
      <form>
        <div class="mb-3">
          <label for="text" class="form-label">Quote Text</label>
          <textarea class="form-control" id="text" name="text" [(ngModel)]="formData.text" rows="4"></textarea>
        </div>
        <div class="mb-3">
          <label for="author" class="form-label">Author</label>
          <input type="text" class="form-control" id="author" name="author" [(ngModel)]="formData.author" />
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-success" (click)="onSave()">
            <i class="fas fa-save me-2"></i> Save
          </button>
          <button type="button" class="btn btn-secondary" (click)="onCancel()">
            <i class="fas fa-times me-2"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="row g-3" *ngIf="quotes.length > 0 && !isFormVisible">
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let quote of quotes">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column justify-content-between">
          <blockquote class="blockquote mb-3">
            <p class="mb-3">"{{ quote.text }}"</p>
            <footer class="blockquote-footer">{{ quote.author }}</footer>
          </blockquote>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-sm btn-outline-primary" (click)="onEdit(quote)">
              <i class="fas fa-edit"></i>
            </button>
            <button type="button" class="btn btn-sm btn-outline-danger" (click)="onDelete(quote.id)">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="quotes.length === 0 && !isFormVisible" class="text-center py-5">
    <p class="mb-3 text-muted">No quotes yet.</p>
    <button type="button" class="btn btn-outline-primary" (click)="onAddNew()">
      <i class="fas fa-plus me-2"></i> Add a quote
    </button>
  </div>
</div>
