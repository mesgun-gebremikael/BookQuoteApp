<div class="container mt-4">
  <h1 class="mb-4">My Quotes</h1>

  <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

  <button class="btn btn-primary mb-3" (click)="onAddNew()" *ngIf="!isFormVisible">
    <i class="fas fa-plus"></i> Add New Quote
  </button>

  <!-- Form for adding/editing a quote -->
  <div class="card mb-4" *ngIf="isFormVisible">
    <div class="card-header">
      <h5>{{ isEditing ? 'Edit Quote' : 'Add New Quote' }}</h5>
    </div>
    <div class="card-body">
      <form>
        <div class="mb-3">
          <label for="text" class="form-label">Quote Text</label>
          <textarea class="form-control" id="text" name="text" [(ngModel)]="formData.text" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label for="author" class="form-label">Author</label>
          <input type="text" class="form-control" id="author" name="author" [(ngModel)]="formData.author" />
        </div>

        <button type="button" class="btn btn-success me-2" (click)="onSave()">
          <i class="fas fa-save"></i> Save
        </button>
        <button type="button" class="btn btn-secondary" (click)="onCancel()">
          <i class="fas fa-times"></i> Cancel
        </button>
      </form>
    </div>
  </div>

  <!-- Quotes list -->
  <div class="row" *ngIf="quotes.length > 0 && !isFormVisible">
    <div class="col-md-6 col-lg-4 mb-3" *ngFor="let quote of quotes">
      <div class="card h-100">
        <div class="card-body">
          <blockquote class="blockquote mb-0">
            <p>"{{ quote.text }}"</p>
            <footer class="blockquote-footer">{{ quote.author }}</footer>
          </blockquote>
        </div>
        <div class="card-footer">
          <button class="btn btn-sm btn-outline-primary me-2" (click)="onEdit(quote)">
            <i class="fas fa-edit"></i> Edit
          </button>
          <button class="btn btn-sm btn-outline-danger" (click)="onDelete(quote.id)">
            <i class="fas fa-trash"></i> Delete
          </button>
        </div>
      </div>
    </div>
  </div>

  <p class="text-muted" *ngIf="quotes.length === 0 && !isFormVisible">
    No quotes found. <a href="javascript:void(0);" (click)="onAddNew()">Add one now!</a>
  </p>
</div>
