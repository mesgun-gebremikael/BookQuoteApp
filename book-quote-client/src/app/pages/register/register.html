<h2>Register</h2>

<form (ngSubmit)="register()">
  <div>
    <label>Username</label>
    <input name="username" [(ngModel)]="username" />
  </div>

  <div>
    <label>Password</label>
    <input name="password" type="password" [(ngModel)]="password" />
  </div>

  <div>
    <label>Confirm Password</label>
    <input name="confirmPassword" type="password" [(ngModel)]="confirmPassword" />
  </div>

  <button type="submit">Register</button>
</form>

<p style="color: green;" *ngIf="successMessage">{{ successMessage }}</p>
<p style="color: red;" *ngIf="errorMessage">{{ errorMessage }}</p>

<p>
  Already have an account? <a href="/login">Login here</a>
</p>
