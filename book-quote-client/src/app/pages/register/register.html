<section class="d-flex align-items-center justify-content-center min-vh-100 bg-body-secondary py-5">
  <div class="card shadow-sm w-100" style="max-width: 460px;">
    <div class="card-body p-4">
      <h2 class="card-title text-center mb-3">Register</h2>

      <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

      <form (ngSubmit)="register()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" [(ngModel)]="username" />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" name="password" type="password" [(ngModel)]="password" />
          <div class="form-text small text-muted mt-2">
            Your password must include:
            <ul class="mb-0 ps-3">
              <li>At least 8 characters</li>
              <li>One uppercase letter</li>
              <li>One lowercase letter</li>
              <li>One number</li>
              <li>One special character</li>
            </ul>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" name="confirmPassword" type="password" [(ngModel)]="confirmPassword" />
          <div *ngIf="password && confirmPassword && password !== confirmPassword" class="form-text text-danger small mt-2">
            Passwords do not match.
          </div>
        </div>

        <button class="btn btn-success w-100" type="submit" [disabled]="isLoading">
          <i class="fas fa-user-plus me-2"></i>
          {{ isLoading ? 'Registering...' : 'Register' }}
        </button>
      </form>

      <div class="mt-3 text-center small text-muted">
        Already have an account? <a routerLink="/login">Login here</a>
      </div>
    </div>
  </div>
</section>
