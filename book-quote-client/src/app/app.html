<nav *ngIf="showNav" class="navbar navbar-expand-lg" [ngClass]="{ 'navbar-dark bg-dark': isDarkMode, 'navbar-light bg-white shadow-sm': !isDarkMode }">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/books">RedRiver</a>
    <button class="navbar-toggler" type="button" (click)="toggleNavbar()" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="!isNavbarCollapsed">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/books" routerLinkActive="active">Books</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/quotes" routerLinkActive="active">My Quotes</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-secondary" type="button" (click)="toggleTheme()">
          <i class="fas" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
        </button>
        <button class="btn btn-outline-danger" type="button" (click)="onLogout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="min-vh-100 py-4" [ngClass]="{ 'bg-dark text-white': isDarkMode }">
  <div class="container">
    <router-outlet></router-outlet>
  </div>
</main>
